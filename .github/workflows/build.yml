name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            zip_name: BC-Camping-Bot-macOS.zip
          - os: windows-latest
            name: Windows
            zip_name: BC-Camping-Bot-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --name "BC Camping Bot" \
            --windowed \
            --collect-all playwright \
            --hidden-import webview.platforms.cocoa \
            --hidden-import plyer.platforms.macosx \
            --hidden-import plyer.platforms.macosx.notification \
            run.py
          find dist -name ".local-browsers" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Sign app (macOS)
        if: runner.os == 'macOS'
        run: |
          find "dist/BC Camping Bot.app" -type f \( -name "*.so" -o -name "*.dylib" \) -exec codesign --force -s - {} \; || true
          codesign --force -s - "dist/BC Camping Bot.app/Contents/MacOS/BC Camping Bot"
          codesign --force -s - "dist/BC Camping Bot.app"
          codesign --verify --deep "dist/BC Camping Bot.app"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --name "BC Camping Bot" \
            --windowed \
            --collect-all playwright \
            --hidden-import webview.platforms.edgechromium \
            --hidden-import plyer.platforms.win \
            --hidden-import plyer.platforms.win.notification \
            run.py
          find dist -name ".local-browsers" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.zip_name }} "BC Camping Bot.app"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist\BC Camping Bot" -DestinationPath ${{ matrix.zip_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.zip_name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BC-Camping-Bot-macOS.zip
            BC-Camping-Bot-Windows.zip
          generate_release_notes: true
          body: |
            ## macOS Install
            Open Terminal and paste:
            ```
            curl -sL https://raw.githubusercontent.com/decoyblaze/bc-camping-bot/main/install-mac.sh | bash
            ```
            This downloads, installs to Applications, and launches the app. No security warnings.

            ## Windows Install
            1. Download `BC-Camping-Bot-Windows.zip` below
            2. Unzip and run `BC Camping Bot.exe`
            3. If SmartScreen appears, click "More info" → "Run anyway"

            ## First launch
            Both platforms will auto-install the browser engine on first launch (~150 MB one-time download).
